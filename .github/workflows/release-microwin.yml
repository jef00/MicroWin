name: Pre-Release MicroWin

on:
  workflow_dispatch:

jobs:
  build-and-pre-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore MicroWin.slnx

      - name: Build MicroWin
        run: |
          msbuild MicroWin.slnx /p:Configuration=Release /p:Platform="Any CPU"

      - name: Find and display build output
        run: |
          Get-ChildItem -Path . -Recurse -Filter "MicroWin.exe" | ForEach-Object { $_.FullName }

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.${{ github.run_number }}-beta
          name: MicroWin Alpha v0.${{ github.run_number }}
          generate_release_notes: true
          draft: false
          prerelease: true
          files: |
            ./MicroWin/bin/Release/MicroWin.exe
